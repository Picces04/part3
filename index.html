<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOEIC Part 3 — Ôn tập tổng hợp</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#F7F5F0; --card:#fff; --primary:#1A4731; --accent:#4CAF81;
    --accent-light:#E8F5EE; --text:#1C1C1C; --muted:#6B7280;
    --border:#E5E2DC; --wrong-bg:#FEF2F2; --wrong:#DC2626;
    --correct-bg:#F0FDF4; --correct:#16A34A;
    --radius:14px; --shadow:0 2px 16px rgba(0,0,0,0.07);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:4rem;}

  .site-header{background:var(--primary);padding:1.1rem 1.5rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
  .site-title{font-family:'DM Serif Display',serif;font-size:1.2rem;color:#fff;}
  .site-title span{color:var(--accent);}
  .header-stats{display:flex;gap:1.25rem;align-items:center;}
  .hstat{font-size:0.75rem;color:rgba(255,255,255,0.6);text-align:center;}
  .hstat strong{display:block;font-size:1rem;font-weight:600;color:#fff;}
  .hstat strong.g{color:#6EE7A0;} .hstat strong.r{color:#FCA5A5;}

  .progress-wrap{background:var(--primary);padding:0 1.5rem 0.6rem;}
  .progress-track{height:3px;background:rgba(255,255,255,0.15);border-radius:99px;overflow:hidden;}
  .progress-fill{height:100%;background:var(--accent);border-radius:99px;transition:width 0.4s ease;}

  .container{max-width:720px;margin:0 auto;padding:1.5rem 1.25rem 0;}

  /* FILTER BAR */
  .filter-bar{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:1.25rem;align-items:center;}
  .filter-bar label{font-size:0.78rem;color:var(--muted);margin-right:2px;}
  .fbtn{font-family:'DM Sans',sans-serif;font-size:0.78rem;padding:5px 13px;border-radius:99px;border:1.5px solid var(--border);background:var(--card);color:var(--muted);cursor:pointer;transition:all 0.18s;font-weight:500;}
  .fbtn:hover{border-color:var(--accent);color:var(--primary);}
  .fbtn.active{background:var(--primary);border-color:var(--primary);color:#fff;}
  .sep{width:1px;height:20px;background:var(--border);margin:0 2px;}
  .mbtn{font-family:'DM Sans',sans-serif;font-size:0.78rem;padding:5px 13px;border-radius:99px;border:1.5px solid var(--border);background:var(--card);color:var(--muted);cursor:pointer;transition:all 0.18s;font-weight:500;}
  .mbtn:hover{border-color:var(--accent);color:var(--primary);}
  .mbtn.active{background:#3B6D11;border-color:#3B6D11;color:#fff;}

  .q-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:1.6rem;margin-bottom:1.1rem;border:1px solid var(--border);animation:slideIn 0.25s ease;}
  @keyframes slideIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

  .q-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:0.9rem;}
  .q-badge{font-size:0.7rem;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--accent);background:var(--accent-light);padding:3px 10px;border-radius:99px;}
  .q-num{font-size:0.76rem;color:var(--muted);font-weight:500;}
  .q-test-tag{font-size:0.68rem;padding:2px 8px;border-radius:99px;font-weight:600;}
  .tag-t1{background:#EEF2FF;color:#4338CA;}
  .tag-t2{background:#FFF7ED;color:#C2410C;}
  .tag-t3{background:#F0FDF4;color:#16A34A;}

  .q-text{font-size:0.97rem;line-height:1.65;color:var(--text);margin-bottom:1.1rem;}

  .graphic-box{margin:0.6rem 0 1rem;border:1px solid var(--border);border-radius:10px;overflow:hidden;font-size:0.83rem;}
  .graphic-title{background:var(--primary);color:#fff;padding:6px 13px;font-weight:600;font-size:0.76rem;letter-spacing:0.04em;}
  .graphic-body{padding:9px 13px;}
  .graphic-body table{width:100%;border-collapse:collapse;}
  .graphic-body th{text-align:left;font-weight:600;font-size:0.75rem;color:var(--muted);padding:3px 7px 5px;border-bottom:1px solid var(--border);}
  .graphic-body td{padding:4px 7px;font-size:0.81rem;color:var(--text);border-bottom:0.5px solid var(--border);}
  .graphic-body tr:last-child td{border-bottom:none;}
  .graphic-body .total-row td{font-weight:600;border-top:1.5px solid var(--border);}

  /* Concert seating SVG */
  .seating-wrap{padding:8px;text-align:center;}
  .seating-wrap svg{max-width:280px;width:100%;}

  /* Map graphic */
  .map-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:10px;}
  .map-cell{border:1px solid var(--border);border-radius:8px;padding:10px 8px;text-align:center;font-size:0.82rem;}
  .map-cell .site-label{font-size:0.7rem;color:var(--muted);font-weight:600;}
  .map-cell .site-name{font-weight:500;margin-top:2px;}

  .options{display:flex;flex-direction:column;gap:8px;}
  .opt{display:flex;align-items:flex-start;gap:10px;padding:10px 13px;border:1.5px solid var(--border);border-radius:10px;cursor:pointer;transition:all 0.18s;background:#fff;user-select:none;}
  .opt:hover:not(.locked){border-color:var(--accent);background:var(--accent-light);}
  .opt.locked{cursor:default;}
  .opt.correct{border-color:var(--correct);background:var(--correct-bg);}
  .opt.wrong{border-color:var(--wrong);background:var(--wrong-bg);}
  .opt-key{width:23px;height:23px;border-radius:50%;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:0.73rem;font-weight:600;flex-shrink:0;color:var(--muted);transition:all 0.18s;margin-top:1px;}
  .opt:hover:not(.locked) .opt-key{border-color:var(--accent);color:var(--primary);}
  .opt.correct .opt-key{background:var(--correct);border-color:var(--correct);color:#fff;}
  .opt.wrong .opt-key{background:var(--wrong);border-color:var(--wrong);color:#fff;}
  .opt-text{font-size:0.9rem;line-height:1.5;color:var(--text);padding-top:2px;}
  .opt.correct .opt-text{color:var(--correct);font-weight:500;}
  .opt.wrong .opt-text{color:var(--wrong);}

  .feedback{margin-top:0.9rem;padding:9px 13px;border-radius:8px;font-size:0.855rem;font-weight:500;display:none;animation:fadeIn 0.2s ease;}
  @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
  .feedback.show{display:block;}
  .feedback.ok{background:var(--correct-bg);color:var(--correct);border:1px solid #bbf7d0;}
  .feedback.bad{background:var(--wrong-bg);color:var(--wrong);border:1px solid #fecaca;}

  .actions{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:2rem;}
  .action-left{font-size:0.78rem;color:var(--muted);}
  .btn{font-family:'DM Sans',sans-serif;font-size:0.88rem;font-weight:600;padding:9px 20px;border-radius:10px;border:none;cursor:pointer;transition:all 0.18s;}
  .btn:active{transform:scale(0.97);}
  .btn-ghost{background:transparent;color:var(--muted);border:1.5px solid var(--border);}
  .btn-ghost:hover{border-color:var(--muted);color:var(--text);}
  .btn-main{background:var(--primary);color:#fff;}
  .btn-main:hover{background:#163d27;}
  .btn-accent{background:var(--accent);color:#fff;}
  .btn-accent:hover{background:#3a9e6a;}

  #result-area{display:none;animation:slideIn 0.3s ease;}
  .result-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--border);padding:2.5rem 1.5rem;text-align:center;}
  .score-circle{width:120px;height:120px;border-radius:50%;background:var(--primary);display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 1.25rem;}
  .score-num{font-family:'DM Serif Display',serif;font-size:2rem;color:#fff;line-height:1;}
  .score-denom{font-size:0.75rem;color:rgba(255,255,255,0.6);margin-top:2px;}
  .result-title{font-family:'DM Serif Display',serif;font-size:1.5rem;margin-bottom:0.4rem;}
  .result-msg{font-size:0.88rem;color:var(--muted);margin-bottom:1.75rem;line-height:1.6;}
  .result-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
  .breakdown{display:flex;gap:0.75rem;justify-content:center;margin-bottom:1.75rem;flex-wrap:wrap;}
  .bkstat{background:var(--bg);padding:0.65rem 1rem;border-radius:10px;text-align:center;min-width:75px;}
  .bkstat-num{font-size:1.3rem;font-weight:600;}
  .bkstat-lbl{font-size:0.7rem;color:var(--muted);margin-top:2px;}
  .gc{color:var(--correct);} .rc{color:var(--wrong);}

  @media(max-width:500px){
    .site-header{padding:0.9rem 1rem;}
    .container{padding:1.1rem 0.9rem 0;}
    .q-card{padding:1.1rem;}
    .header-stats{gap:0.9rem;}
  }
</style>
</head>

<header class="site-header">
  <div class="site-title">TOEIC <span>Part 3</span></div>
  <div class="header-stats">
    <div class="hstat"><strong id="h-qnum">1/39</strong>câu</div>

</div>

<main class="container">

  </div>

  <div id="quiz-area">
    <div class="q-card" id="q-card">
      <div class="q-meta">
        <div style="display:flex;gap:6px;align-items:center;">
          <span class="q-badge">Part 3</span>
          <span class="q-test-tag" id="q-tag"></span>
        </div>
        <span class="q-num" id="q-num"></span>
      </div>
      <div class="q-text" id="q-text"></div>
      <div id="graphic-area"></div>
      <div class="options" id="options"></div>
      <div class="feedback" id="feedback"></div>
    </div>
    <div class="actions">

        <button class="btn btn-main"  id="next-btn" onclick="nextQ()" style="display:none">Tiếp theo →</button>
      </div>
    </div>
  </div>

  <div id="result-area">
    <div class="result-card">
      <div class="score-circle">
        <div class="score-num" id="r-score">0</div>
        <div class="score-denom" id="r-total">/39</div>
      </div>
      <div class="result-title" id="r-title"></div>
      <div class="result-msg"   id="r-msg"></div>
      <div class="breakdown">
        <div class="bkstat"><div class="bkstat-num gc" id="r-cor">0</div><div class="bkstat-lbl">Đúng</div></div>
        <div class="bkstat"><div class="bkstat-num rc" id="r-wrg">0</div><div class="bkstat-lbl">Sai</div></div>
        <div class="bkstat"><div class="bkstat-num"   id="r-pct">0%</div><div class="bkstat-lbl">Tỉ lệ</div></div>
      </div>
      <div class="result-btns">
        <button class="btn btn-ghost"  onclick="reviewWrong()" id="review-btn">Ôn lại câu sai</button>
        <button class="btn btn-accent" onclick="restart()">Làm lại</button>
      </div>
    </div>
  </div>
</main>

const TAG_CLASS = {1:'tag-t1',2:'tag-t2',3:'tag-t3'};
const TAG_LABEL = {1:'Test 1',2:'Test 2',3:'Test 3'};

let filter='all', mode='seq', order=[], idx=0, correct=0, wrong=0, answered=false, wrongList=[], isReview=false;

function filteredIndices(){
  if(filter==='all') return ALL.map((_,i)=>i);
  return ALL.map((_,i)=>i).filter(i=>ALL[i].t===+filter);
}

function setFilter(f){
  filter=f;
  ['all','1','2','3'].forEach(x=>{
    document.getElementById('f-'+x).className='fbtn'+(f===x?' active':'');
  });
  restart();
}
function setMode(m){
  mode=m;
  document.getElementById('m-seq').className='mbtn'+(m==='seq'?' active':'');
  document.getElementById('m-rand').className='mbtn'+(m==='rand'?' active':'');
  restart();
}

function restart(){
  isReview=false; wrongList=[]; correct=0; wrong=0; idx=0;
  order=filteredIndices();
  if(mode==='rand') order.sort(()=>Math.random()-0.5);
  document.getElementById('result-area').style.display='none';
  document.getElementById('quiz-area').style.display='block';
  updateStats(); renderQ();
}
function reviewWrong(){
  if(!wrongList.length) return;
  isReview=true; order=[...wrongList]; wrongList=[]; correct=0; wrong=0; idx=0;
  document.getElementById('result-area').style.display='none';
  document.getElementById('quiz-area').style.display='block';
  updateStats(); renderQ();
}
function updateStats(){
  const total=order.length;
  document.getElementById('h-qnum').textContent=(idx+1)+'/'+total;
  document.getElementById('h-correct').textContent=correct;
  document.getElementById('h-wrong').textContent=wrong;
  document.getElementById('prog-fill').style.width=((idx+1)/total*100)+'%';
}
function renderQ(){
  answered=false;
  const q=ALL[order[idx]];
  updateStats();
  const tag=document.getElementById('q-tag');
  tag.textContent=TAG_LABEL[q.t];
  tag.className='q-test-tag '+TAG_CLASS[q.t];
  document.getElementById('q-num').textContent='Q'+q.n;
  document.getElementById('q-text').textContent=q.q;
  document.getElementById('graphic-area').innerHTML=q.g?GFX[q.g]:'';
  const fb=document.getElementById('feedback');
  fb.className='feedback'; fb.textContent='';
  document.getElementById('skip-btn').style.display='inline-block';
  document.getElementById('skip-hint').style.display='block';
  document.getElementById('next-btn').style.display='none';
  const labels=['A','B','C','D'];
  const optDiv=document.getElementById('options');
  optDiv.innerHTML='';
  q.opts.forEach((o,i)=>{
    const d=document.createElement('div');
    d.className='opt';
    d.innerHTML=`<div class="opt-key">${labels[i]}</div><div class="opt-text">${o}</div>`;
    d.onclick=()=>pick(i,d,q);
    optDiv.appendChild(d);
  });
  const card=document.getElementById('q-card');
  card.style.animation='none'; void card.offsetWidth; card.style.animation='slideIn 0.25s ease';
}
function pick(i,el,q){
  if(answered) return;
  answered=true;
  document.querySelectorAll('.opt').forEach(o=>o.classList.add('locked'));
  const fb=document.getElementById('feedback');
  if(i===q.ans){
    el.classList.add('correct'); correct++;
    fb.textContent='✓ Chính xác!'; fb.className='feedback show ok';
  } else {
    el.classList.add('wrong');
    document.querySelectorAll('.opt')[q.ans].classList.add('correct');
    wrong++;
    if(!wrongList.includes(order[idx])) wrongList.push(order[idx]);
    fb.textContent='✗ Đáp án đúng: '+['A','B','C','D'][q.ans]+'. '+q.opts[q.ans];
    fb.className='feedback show bad';
  }
  document.getElementById('h-correct').textContent=correct;
  document.getElementById('h-wrong').textContent=wrong;
  document.getElementById('skip-btn').style.display='none';
  document.getElementById('skip-hint').style.display='none';
  document.getElementById('next-btn').style.display='inline-block';
}
function nextQ(){
  if(!answered){ if(!wrongList.includes(order[idx])) wrongList.push(order[idx]); wrong++; document.getElementById('h-wrong').textContent=wrong; }
  idx++;
  if(idx>=order.length){ showResult(); return; }
  renderQ();
}
function showResult(){
  document.getElementById('quiz-area').style.display='none';
  document.getElementById('result-area').style.display='block';
  const total=order.length, pct=Math.round(correct/total*100);
  document.getElementById('r-score').textContent=correct;
  document.getElementById('r-total').textContent='/'+total;
  document.getElementById('r-cor').textContent=correct;
  document.getElementById('r-wrg').textContent=wrong;
  document.getElementById('r-pct').textContent=pct+'%';
  document.getElementById('r-title').textContent=pct>=85?'🎉 Xuất sắc!':pct>=70?'👍 Tốt lắm!':pct>=50?'📖 Cần cố thêm':'💪 Ôn kỹ lại nhé!';
  document.getElementById('r-msg').textContent=pct>=85?'Nắm vững Part 3 rồi, tiếp tục giữ phong độ!':pct>=70?'Kết quả tốt! Luyện thêm vài lần nữa là vững.':pct>=50?'Tập trung vào câu inference và implication nhé.':'Ôn lại từng test một trước, rồi trộn sau.';
  document.getElementById('review-btn').style.display=wrongList.length?'inline-block':'none';
  document.getElementById('prog-fill').style.width='100%';
}
restart();
</script>
